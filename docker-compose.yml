services:
  redis:
    image: redis:7-alpine
    env_file: .env
    command: sh -c 'redis-server --requirepass "$${REDIS_PASSWORD}" --appendonly yes'
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "redis-cli --no-auth-warning -a $${REDIS_PASSWORD} ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  webhook:
    build:
      context: .
      dockerfile: services/webhook/Dockerfile
    command: sh -c 'python main.py 2>&1 | tee /var/log/bot/webhook.log'
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./logs:/var/log/bot
    ports:
      - "10000:8080"
    environment:
      - PYTHONPATH=/app
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_INSTALLATION_ID=${GITHUB_INSTALLATION_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - QUEUE_TYPE=redis
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: services/agent_worker/Dockerfile
    command: sh -c 'python3 -m services.agent_worker.worker 2>&1 | tee /var/log/bot/worker.log'
    env_file: .env
    restart: unless-stopped
    volumes:
      # Claude home — read-only access to memory
      - ~/.claude:/home/bot/.claude:ro
      - ./logs:/var/log/bot
    environment:
      - PYTHONPATH=/app
      # Worker creates jobs in queue (lightweight coordinator)
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_INSTALLATION_ID=${GITHUB_INSTALLATION_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      - QUEUE_TYPE=redis
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Session streaming URL (for live-view links in GitHub comments)
      - SESSION_PROXY_URL=${SESSION_PROXY_URL:-http://localhost:10001}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q worker || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  sandbox_worker:
    build:
      context: .
      dockerfile: services/sandbox_executor/Dockerfile
    entrypoint: ["/app/entrypoint.sh"]
    command: sh -c '(socat TCP-LISTEN:18000,fork TCP:mcp_proxy:18000 >/dev/null 2>&1 &) && python -m services.sandbox_executor.sandbox_worker 2>&1 | tee /var/log/bot/sandbox_worker.log'
    env_file: .env
    restart: unless-stopped
    mem_limit: 4g
    volumes:
      # Persistent cache for bare repositories across all workers
      - repo-cache:/var/cache/repos:rw
      # Claude home — bind-mounted from host ~/.claude/ for CLI-friendly sessions
      - ~/.claude:/home/bot/.claude:rw
      - ~/.claude.json:/home/bot/.claude.json:rw
      - ./logs:/var/log/bot
      # gcloud credentials for Vertex AI — sandbox is the one calling the SDK
      # Mounted to bot user's home directory
      - ${APPDATA}/gcloud/application_default_credentials.json:/home/bot/.config/gcloud/application_default_credentials.json:ro
    environment:
      - PYTHONPATH=/app
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL}
      - ANTHROPIC_VERTEX_PROJECT_ID=${ANTHROPIC_VERTEX_PROJECT_ID}
      - ANTHROPIC_VERTEX_REGION=${ANTHROPIC_VERTEX_REGION}
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=${CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC:-1}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=http://langfuse:3000
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - SDK_DEBUG=${SDK_DEBUG:-false}
      - ALLOW_HOST_MCP=${ALLOW_HOST_MCP:-true}
      - MEMORY_WORKER_ENABLED=${MEMORY_WORKER_ENABLED:-true}
      - RETROSPECTOR_ENABLED=${RETROSPECTOR_ENABLED:-true}
      - INDEXING_ENABLED=${INDEXING_ENABLED:-false}
      - SURREALDB_URL=http://surrealdb:8000/rpc
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      langfuse:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q worker || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  mcp_proxy:
    build:
      context: .
      dockerfile: services/mcp_proxy/Dockerfile
    command: sh -c '(socat TCP-LISTEN:11434,fork TCP:host.docker.internal:11434 >/dev/null 2>&1 &) && (socat TCP-LISTEN:8000,fork TCP:surrealdb:8000 >/dev/null 2>&1 &) && uvicorn services.mcp_proxy.main:app --host 0.0.0.0 --port 18000 2>&1 | tee /var/log/bot/mcp_proxy.log'
    env_file: .env
    restart: unless-stopped
    ports:
      - "127.0.0.1:18000:18000"
    volumes:
      - repo-cache:/var/cache/repos:rw
      - ~/.claude:/home/bot/.claude:rw
      - ./logs:/var/log/bot
    environment:
      - PYTHONPATH=/app
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - SURREALDB_URL=http://surrealdb:8000/rpc
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - INDEXING_ENABLED=${INDEXING_ENABLED:-false}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  memory_worker:
    build:
      context: .
      dockerfile: services/memory_worker/Dockerfile
    command: sh -c '(socat TCP-LISTEN:11434,fork TCP:host.docker.internal:11434 >/dev/null 2>&1 &) && (socat TCP-LISTEN:18000,fork TCP:mcp_proxy:18000 >/dev/null 2>&1 &) && python -m services.memory_worker.memory_worker 2>&1 | tee /var/log/bot/memory_worker.log'
    env_file: .env
    restart: unless-stopped
    mem_limit: 4g
    volumes:
      # Claude home — reads transcripts, writes memory files
      - ~/.claude:/home/bot/.claude:rw
      - ~/.claude.json:/home/bot/.claude.json:rw
      - ./logs:/var/log/bot
      # gcloud credentials for Vertex AI (if using Vertex backend)
      - ${APPDATA}/gcloud/application_default_credentials.json:/home/bot/.config/gcloud/application_default_credentials.json:ro
    environment:
      - PYTHONPATH=/app
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL}
      - ANTHROPIC_VERTEX_PROJECT_ID=${ANTHROPIC_VERTEX_PROJECT_ID}
      - ANTHROPIC_VERTEX_REGION=${ANTHROPIC_VERTEX_REGION}
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=${CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC:-1}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=http://langfuse:3000
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WORKER_SESSION_PERSIST=${WORKER_SESSION_PERSIST:-true}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q worker || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # PostgreSQL for Langfuse
  langfuse-db:
    image: postgres:15-alpine
    env_file: .env
    command: sh -c 'docker-entrypoint.sh postgres 2>&1 | tee /var/log/bot/langfuse-db.log'
    environment:
      POSTGRES_DB: ${LANGFUSE_DB_NAME:-langfuse}
      POSTGRES_USER: ${LANGFUSE_DB_USER:-langfuse}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse}
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
      - ./logs/langfuse:/var/log/bot
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_DB_USER:-langfuse}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ClickHouse for Langfuse v3 (stores traces and observations)
  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:latest
    user: "101:101"
    env_file: .env
    command: sh -c '/entrypoint.sh 2>&1 | tee /var/log/bot/langfuse-clickhouse.log'
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - langfuse-clickhouse-logs:/var/log/clickhouse-server
      - ./logs/langfuse:/var/log/bot
    ports:
      - "127.0.0.1:17123:8123"
      - "127.0.0.1:19000:9000"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 3s
      retries: 5

  # MinIO (S3-compatible storage for Langfuse)
  langfuse-minio:
    image: minio/minio:latest
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data 2>&1 | tee /var/log/bot/langfuse-minio.log'
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - langfuse-minio-data:/data
      - ./logs/langfuse:/var/log/bot
    ports:
      - "127.0.0.1:9090:9000"
      - "127.0.0.1:9091:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Langfuse worker (processes events asynchronously)
  langfuse-worker:
    image: langfuse/langfuse-worker:3.149
    env_file: .env
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:7500
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${REDIS_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy

  # Langfuse web UI
  langfuse:
    image: langfuse/langfuse:3.149
    env_file: .env
    ports:
      - "7500:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:7500
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${REDIS_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-github-agent}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-GitHub Agent}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-github-agent-project}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-GitHub Agent Project}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-lf_pk_github_agent_public}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-lf_sk_github_agent_secret}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@example.com}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-Admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-admin123}
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy

  retrospector_worker:
    build:
      context: .
      dockerfile: services/retrospector_worker/Dockerfile
    command: sh -c '(socat TCP-LISTEN:11434,fork TCP:host.docker.internal:11434 >/dev/null 2>&1 &) && (socat TCP-LISTEN:18000,fork TCP:mcp_proxy:18000 >/dev/null 2>&1 &) && python -m services.retrospector_worker.retrospector_worker 2>&1 | tee /var/log/bot/retrospector_worker.log'
    env_file: .env
    restart: unless-stopped
    mem_limit: 4g
    volumes:
      # Claude home — reads transcripts
      - ~/.claude:/home/bot/.claude:rw
      - ~/.claude.json:/home/bot/.claude.json:rw
      # Bare repo cache — needed to create worktrees of the bot repo
      - repo-cache:/var/cache/repos:rw
      - ./logs:/var/log/bot
      # gcloud credentials for Vertex AI (if using Vertex backend)
      - ${APPDATA}/gcloud/application_default_credentials.json:/home/bot/.config/gcloud/application_default_credentials.json:ro
    environment:
      - PYTHONPATH=/app
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL}
      - ANTHROPIC_VERTEX_PROJECT_ID=${ANTHROPIC_VERTEX_PROJECT_ID}
      - ANTHROPIC_VERTEX_REGION=${ANTHROPIC_VERTEX_REGION}
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=${CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC:-1}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_HOOK_TIMEOUT=${LANGFUSE_HOOK_TIMEOUT:-30}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WORKER_SESSION_PERSIST=${WORKER_SESSION_PERSIST:-true}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_INSTALLATION_ID=${GITHUB_INSTALLATION_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      # The bot's own repository — retrospector opens PRs here
      - BOT_REPO=${BOT_REPO:-GabsFranke/claude-code-github-agent}
      - BOT_USERNAME=${BOT_USERNAME:-Claude Code Agent}
      - BOT_USER_EMAIL=${BOT_USER_EMAIL:-claude-code-agent[bot]@users.noreply.github.com}
    depends_on:
      redis:
        condition: service_healthy
      repo_sync:
        condition: service_healthy

  repo_sync:
    build:
      context: .
      dockerfile: services/repo_sync/Dockerfile
    command: sh -c 'python -m services.repo_sync.sync_worker 2>&1 | tee /var/log/bot/repo_sync.log'
    env_file: .env
    restart: unless-stopped
    volumes:
      - repo-cache:/var/cache/repos:rw
      - ./logs:/var/log/bot
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # GitHub App credentials for cloning private repos when token not provided
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_INSTALLATION_ID=${GITHUB_INSTALLATION_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Multi-model database: graph edges + vector search + full-text search
  surrealdb:
    image: surrealdb/surrealdb:latest
    user: "0:0"
    volumes:
      - surrealdb-data:/data
    ports:
      - "127.0.0.1:8000:8000"
    command: start --user root --pass root rocksdb:/data/db
    healthcheck:
      test: ["CMD", "/surreal", "isready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Background worker: chunks code, generates embeddings, stores in SurrealDB
  indexing_worker:
    build:
      context: .
      dockerfile: services/indexing_worker/Dockerfile
    command: sh -c 'python -m services.indexing_worker.indexing_worker 2>&1 | tee /var/log/bot/indexing_worker.log'
    env_file: .env
    restart: unless-stopped
    volumes:
      - repo-cache:/var/cache/repos:rw
      - ./logs:/var/log/bot
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SURREALDB_URL=http://surrealdb:8000/rpc
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - INDEXING_ENABLED=${INDEXING_ENABLED:-false}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-gemini-embedding-001}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_INSTALLATION_ID=${GITHUB_INSTALLATION_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
    depends_on:
      redis:
        condition: service_healthy
      surrealdb:
        condition: service_healthy

  session_proxy:
    build:
      context: .
      dockerfile: services/session_proxy/Dockerfile
    command: sh -c 'python -m services.session_proxy.main 2>&1 | tee /var/log/bot/session_proxy.log'
    restart: unless-stopped
    ports:
      - "10001:8080"
    volumes:
      - ./logs:/var/log/bot
      - ~/.claude:/home/bot/.claude:ro
    environment:
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CLAUDE_HOME=/home/bot/.claude
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  repo-cache:
  redis-data:
  langfuse-db-data:
  langfuse-clickhouse-data:
  langfuse-clickhouse-logs:
  langfuse-minio-data:
  surrealdb-data:
