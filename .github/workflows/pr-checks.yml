name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check PR title
        run: |
          if [[ ! "${{ github.event.pull_request.title }}" =~ ^(feat|fix|docs|style|refactor|test|chore|perf):.+ ]]; then
            echo "PR title must start with: feat:|fix:|docs:|style:|refactor:|test:|chore:|perf:"
            exit 1
          fi

      - name: Check PR has description
        run: |
          if [ -z "${{ github.event.pull_request.body }}" ]; then
            echo "PR must have a description"
            exit 1
          fi

  test-summary:
    runs-on: ubuntu-latest
    needs: [validate]
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "All PR checks completed"
          echo "Review the test results above"
