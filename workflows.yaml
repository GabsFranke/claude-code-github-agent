# Workflow definitions for GitHub Agent
# Each workflow defines:
# - triggers: What GitHub events or user commands trigger it
# - prompt: How to build the prompt for Claude Agent SDK
# - description: Human-readable description
# - skip_self: Whether to skip events triggered by the bot itself (optional, default: true)
# - conversation: Persistence settings for multi-turn conversations (optional)
#   - ttl_hours defaults to 720 (30 days) via shared/constants.py if omitted

workflows:
  review-pr:
    triggers:
      events:
        - event: pull_request.opened
        - event: pull_request.labeled
          filters:
            label.name: ["review", "pr-review", "review-pr"]
      commands:
        - /review
        - /pr-review
        - /review-pr
    prompt:
      template: "/pr-review-toolkit:review-pr {repo} {issue_number}"
      # system_context: "review.md" # Load from prompts/review.md
    description: "Review a pull request"
    context:
      repomap_budget: 4096
      personalized: true
      include_test_files: true
    conversation:
      persist: true
    streaming:
      enabled: true
      tool_approval: false

  triage-issue:
    triggers:
      events:
        - event: issues.opened
        - event: issues.labeled
          filters:
            label.name: "triage"
      commands:
        - /triage
        - /triage-issue
    prompt:
      template: "Triage issue #{issue_number} in {repo}"
      system_context: "triage.md" # Load from prompts/triage.md
    description: "Triage an issue"
    context:
      repomap_budget: 1024
      personalized: false
    conversation:
      persist: true
      auto_continue: true
    streaming:
      enabled: true
      tool_approval: false

  fix-ci:
    triggers:
      events:
        - event: workflow_job.completed
          filters:
            workflow_job.conclusion: "failure"
      commands:
        - /fix-ci
        - /fix-build
        - /fix-tests
    prompt:
      template: "/ci-failure-toolkit:fix-ci {repo} {issue_number}"
      # system_context: "fix-ci.md"
    description: "Analyze and fix CI/CD failures"
    context:
      repomap_budget: 4096
      personalized: true
      priority_focus: ["build_system", "test_structure"]
    conversation:
      persist: true
    streaming:
      enabled: true
      tool_approval: false
    skip_self: true

  test-toolkit:
    triggers:
      commands:
        - /test
    prompt:
      template: "/test-toolkit:test {user_query}"
      # Uses commands/test.md — same layout as pr-review-toolkit and ci-failure-toolkit
    description: "Run a generic task via test-toolkit plugin to verify tool/skill inheritance"
    context:
      repomap_budget: 4096
      personalized: false
    conversation:
      persist: true
    streaming:
      enabled: true
      tool_approval: false
    skip_self: false

  generic:
    triggers:
      commands:
        - /agent
    prompt:
      template: "{user_query}"
      system_context: "generic.md" # Load from prompts/generic.md
    description: "Generic agent request"
    context:
      repomap_budget: 4096
      personalized: false
    conversation:
      persist: true
      auto_continue: true
    streaming:
      enabled: true
      tool_approval: false
    skip_self: false

  fix-review:
    triggers:
      events:
        - event: pull_request.labeled
          filters:
            label.name: ["fix-review", "fix-it", "pr-fix"]
      commands:
        - /fix-it
    prompt:
      template: "/pr-fix:fix-review {repo} {issue_number}"
    description: "Implement fixes based on PR review feedback"
    context:
      repomap_budget: 4096
      personalized: true
      include_test_files: true
    conversation:
      persist: true
      auto_continue: true
    streaming:
      enabled: true
      tool_approval: false
    skip_self: false
